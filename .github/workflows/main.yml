name: NHL News Parser Bot

on:
  schedule:
    # Запуск каждый час (в 00 минут каждого часа)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Позволяет запускать парсер вручную через вкладку Actions на GitHub

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем актуальный код репозитория на сервер GitHub
      - name: Проверка кода (Checkout)
        uses: actions/checkout@v4

      # Шаг 2: Разворачиваем чистый Python
      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Шаг 3: Устанавливаем все нужные библиотеки для работы кода
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 google-genai

      # Шаг 4: Запускаем скрипт и передаем ему секреты из настроек репозитория
      - name: Запуск парсера хоккея
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
        run: python nhl_bot.py  # Убедись, что твой файл называется именно так!

      # Шаг 5: Сохраняем обновленную историю и собранные новости обратно в репозиторий
      - name: Сохранение результатов (Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Добавляем измененные файлы в индекс git
          git add history.json hockey_news.txt
          
          # Проверяем, изменилось ли что-то. Если новых новостей не было, скрипт просто завершится без ошибок.
          git diff --staged --quiet || (git commit -m "Автоматическое обновление новостей и истории [skip ci]" && git push)
