name: Run NHL News Bot

on:
  schedule:
    - cron: '0 * * * *' # Скрипт автоматически запускается КАЖДЫЙ ЧАС
  workflow_dispatch: # Позволяет запускать бота вручную кнопкой в Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install feedparser pyTelegramBotAPI requests ddgs openai google-generativeai

      - name: Run bot script
        env:
          # Передаем токен Телеграма
          TOKEN: ${{ secrets.TOKEN }}
          
          # Берем твой готовый ключ GROQ_API_KEY и перенаправляем его 
          # в переменную OPENAI_API_KEY, которую ожидает наш скрипт.
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }} 
        run: python nhl_bot.py
