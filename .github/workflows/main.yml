name: Run NHL News Bot

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install feedparser pyTelegramBotAPI requests ddgs openai google-generativeai

      - name: Run bot script
        env:
          TOKEN: ${{ secrets.TOKEN }}
          # Передаем все ключи, которые есть у тебя на GitHub Secrets:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          
          # Направляем ключ Groq в переменную OpenAI, чтобы удовлетворить проверку в коде:
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }} 
        run: python nhl_bot.py
