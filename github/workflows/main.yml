name: Run NHL News Bot

on:
  schedule:
    - cron: '0 * * * *' # Запуск КАЖДЫЙ ЧАС (в 00 минут)
  workflow_dispatch: # Кнопка для ручного запуска в любое время

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install feedparser pyTelegramBotAPI requests ddgs openai

      - name: Run bot script
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python nhl_bot.py
